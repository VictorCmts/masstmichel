name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # Déclenche le déploiement à chaque push sur main
  workflow_dispatch: # Permet de lancer manuellement depuis l'interface GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          # Changer la valeur ci-dessous si vous utilisez un domaine personnalisé :
          # NEXT_PUBLIC_BASE_PATH: ''
          NEXT_PUBLIC_BASE_PATH: /masstmichel

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
